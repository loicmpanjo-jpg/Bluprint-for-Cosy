# ============================================================
# COSY V0.1 — Render Blueprint 100% GRATUIT
# ============================================================
# SOLUTION 2 : Sans worker ni cron (free non supporté)
# Jobs manuels via API + cron externe gratuit (cron-job.org)
# ============================================================
# SERVICES :
#   - cosy-api     : Web Service (Node.js) — FREE
#   - cosy-app     : Static Site (SPA Mobile) — FREE
#   - cosy-dashboard: Static Site (Admin) — FREE
#   - cosy-db      : PostgreSQL 15 — FREE (expire après 30j)
#   - cosy-redis   : Key Value — FREE
# ============================================================
# COUT TOTAL : $0/mois
# ============================================================

services:
  # --- API Backend (Fastify) ---
  - type: web
    name: cosy-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: false
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: cosy-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: cosy-redis
          property: connectionString
      - key: JWT_PRIVATE_KEY
        sync: false
      - key: JWT_PUBLIC_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: APP_NAME
        value: COSY
      - key: APP_VERSION
        value: "0.1"
      - key: CORS_ORIGIN
        value: "https://cosy-app.onrender.com,https://cosy-dashboard.onrender.com"
      - key: RATE_LIMIT_WINDOW
        value: "60000"
      - key: RATE_LIMIT_MAX
        value: "100"
      - key: OTP_EXPIRY
        value: "300"
      - key: JWT_EXPIRY
        value: "3600"
      - key: REFRESH_TOKEN_EXPIRY
        value: "604800"
      - fromGroup: cosy-shared

  # --- Frontend SPA (Static) ---
  - type: web
    name: cosy-app
    runtime: static
    buildCommand: echo "Static SPA - no build needed"
    staticPublishPath: ./frontend
    envVars:
      - key: API_URL
        value: https://cosy-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # --- Dashboard Admin (Static) ---
  - type: web
    name: cosy-dashboard
    runtime: static
    buildCommand: echo "Static Dashboard - no build needed"
    staticPublishPath: ./dashboard
    envVars:
      - key: API_URL
        value: https://cosy-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # --- Redis Key Value ---
  - type: keyvalue
    name: cosy-redis
    ipAllowList: []
    maxmemoryPolicy: allkeys-lru

databases:
  - name: cosy-db
    databaseName: cosy
    user: cosy_admin
    plan: free
    postgresMajorVersion: "15"
    ipAllowList: []

envVarGroups:
  - name: cosy-shared
    envVars:
      - key: APP_NAME
        value: COSY
      - key: APP_VERSION
        value: "0.1"
      - key: RATE_LIMIT_WINDOW
        value: "60000"
      - key: RATE_LIMIT_MAX
        value: "100"
